$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'scss'
stack: 'frontend'
layer: 'library'

fileGroups:
    sources:
        - 'src/**/*.scss'
        - 'assets/**/*'
    tests: []
    configs:
        - 'package.json'
        - 'README.md'
        - 'scripts/**/*.mjs'
        - 'eslint.config.mjs'
        - '.stylelintrc.json'

workspace:
    inheritedTasks:
        exclude:
            - 'test-ci'

tasks:
    build:
        command: 'pnpm build'
        inputs:
            - 'src/**/*.scss'
            - 'assets/**/*'
            - 'package.json'
            - 'README.md'
            - 'scripts/post-build.mjs'
        outputs:
            - 'dist/**'

    build-dev:
        command: 'pnpm build-dev'
        preset: 'server'
