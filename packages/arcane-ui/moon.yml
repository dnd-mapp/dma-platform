$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
stack: 'frontend'
layer: 'library'

tasks:
    build:
        command: 'pnpm build'
        inputs:
            - '**/*.{ts,html,scss}'
            - '**/ng-package.json'
            - 'tsconfig.json'
            - 'tsconfig.lib.json'
            - 'tsconfig.lib.prod.json'
            - 'package.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/tsconfig.json'
        outputs:
            - '/dist/packages/arcane-ui'

    build-dev:
        command: 'pnpm build-dev'
        preset: 'server'

    playwright-install:
        command: 'pnpm playwright-install'
        inputs:
            - 'package.json'

    test-ci:
        command: 'pnpm test-ci'
        deps:
            - 'playwright-install'
        inputs:
            - '**/*.{ts,html,scss}'
            - 'vitest.config.mts'
            - 'tsconfig.json'
            - 'tsconfig.spec.json'
            - 'package.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/tsconfig.json'
        outputs:
            - '/coverage/packages/arcane-ui/**'
            - '/reports/packages/arcane-ui/**'

    test:
        command: 'pnpm test'
        preset: 'server'
        deps:
            - 'playwright-install'

    lint-ts:
        command: 'pnpm lint-ts'
        inputs:
            - '**/*.{ts,html}'
            - 'eslint.config.mjs'
            - 'tsconfig.json'
            - 'tsconfig.lib.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/packages/eslint-config/src/**/*.mjs'

    lint-css:
        command: 'pnpm lint-css --aei'
        inputs:
            - '**/*.scss'
            - '.stylelintrc.json'
            - '/packages/stylelint-config/src/**/*.mjs'
