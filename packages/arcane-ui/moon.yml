$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
stack: 'frontend'
layer: 'library'

fileGroups:
    sources:
        - '**/*.{ts,html,scss}'
        - '!**/*.spec.ts'
        - '!dist/**'
        - '!.angular/**'
        - '!coverage/**'
        - '!reports/**'
    tests:
        - '**/*.spec.ts'
        - '.msw/**/*'
    configs:
        - 'tsconfig*.json'
        - '**/ng-package.json'
        - 'package.json'
        - 'angular.json'
        - 'vitest.config.mts'
        - 'eslint.config.mjs'
        - '.stylelintrc.json'
        - '.storybook/**'

tasks:
    build:
        command: 'pnpm build'
        deps:
            - 'sigil:build'
        inputs:
            - '**/*.{ts,html,scss}'
            - '**/ng-package.json'
            - 'tsconfig.json'
            - 'tsconfig.lib.json'
            - 'tsconfig.lib.prod.json'
            - 'package.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/tsconfig.json'
        outputs:
            - '.angular/**'
            - 'dist/arcane-ui/**'

    build-dev:
        command: 'pnpm build-dev'
        preset: 'server'

    storybook-start:
        command: 'pnpm storybook-start'
        deps:
            - 'sigil:build'
        preset: 'server'

    storybook-build:
        command: 'pnpm storybook-build'
        deps:
            - 'sigil:build'
        env:
            STORYBOOK_BASE_URL: '/'
        inputs:
            - '**/*.{ts,html,scss}'
            - '**/*.stories.ts'
            - '.storybook/**'
            - 'tsconfig.json'
            - 'package.json'
            - '/tsconfig.base.json'
            - '/tsconfig.json'
        outputs:
            - 'dist/storybook/**'

    test-ci:
        command: 'pnpm test-ci'
        deps:
            - 'root:playwright-install'
            - 'sigil:build'
        outputs:
            - 'coverage/**'
            - 'reports/**'

    lint-ts:
        command: 'pnpm lint-ts'

    test:
        command: 'pnpm test'
        preset: 'server'
        deps:
            - 'root:playwright-install'
            - 'sigil:build'

    lint-css:
        command: 'pnpm lint-css --aei'
