$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
stack: 'frontend'
layer: 'automation'

fileGroups:
    sources:
        - 'src/**/*.ts'
    tests: []
    configs:
        - 'tsconfig*.json'
        - 'playwright.config.ts'
        - 'eslint.config.mjs'

dependsOn:
    - realm

workspace:
    inheritedTasks:
        exclude:
            - 'lint-css'
            - 'test-ci'

tasks:
    e2e-ci:
        command: 'pnpm e2e-ci'
        deps:
            - 'root:playwright-install'
        inputs:
            - 'src/**/*.ts'
            - 'playwright.config.ts'
            - 'tsconfig.json'
            - '/tsconfig.base.json'
            - '/.docker/realm/**'
        outputs:
            - 'reports/**'

    e2e:
        command: 'pnpm e2e'
        preset: 'server'
        deps:
            - 'root:playwright-install'
