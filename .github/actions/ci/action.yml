name: CI Checks
description: Runs CI checks for the platform.

runs:
    using: composite
    steps:
        - name: Check formatting
          shell: bash
          run: pnpm format-check

        - name: Lint Markdown
          shell: bash
          run: pnpm lint:md

        - name: Build
          shell: bash
          run: pnpm --filter @dnd-mapp/realm build

        - name: Unit tests
          uses: ./.github/actions/unit-test

        - name: E2E tests
          shell: bash
          run: pnpm --filter @dnd-mapp/realm-e2e test
