name: Push to Main

on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}

jobs:
    ci:
        name: CI
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        env:
            STORYBOOK_BASE_URL: /dma-platform/
        outputs:
            realm_build_affected: ${{ steps.affected.outputs.affected }}
            arcane_ui_storybook_affected: ${{ steps.arcane_ui_storybook_affected.outputs.affected }}
        permissions:
            contents: read
            code-quality: write
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - name: Setup workspace
              uses: ./.github/actions/setup-workspace

            - name: Detect affected realm:build
              id: affected
              uses: ./.github/actions/detect-affected-task
              with:
                  project: realm
                  task: build

            - name: Detect affected arcane-ui:storybook-build
              id: arcane_ui_storybook_affected
              uses: ./.github/actions/detect-affected-task
              with:
                  project: arcane-ui
                  task: storybook-build

            - name: Connect to Tailscale
              uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:github-actions
                  ping: docker-bazel-remote

            - name: Run CI
              shell: bash
              env:
                  MOON_REMOTE_HOST: grpc://docker-bazel-remote:9092
              run: pnpm moon ci

            - name: Upload Storybook artifact
              if: steps.arcane_ui_storybook_affected.outputs.affected == 'true'
              uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
              with:
                  path: packages/arcane-ui/dist/storybook

    docker-promote:
        name: Docker promote
        needs: ci
        if: needs.ci.outputs.realm_build_affected == 'true'
        runs-on: ubuntu-22.04
        timeout-minutes: 10
        permissions:
            contents: read
            pull-requests: read
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Get merged PR number
              id: pr
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  PR_NUMBER=$(gh api \
                    /repos/dnd-mapp/dma-platform/commits/${{ github.sha }}/pulls \
                    --jq '.[0].number')
                  echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

            - name: Log in to Docker Hub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Promote PR image to next
              uses: ./.github/actions/docker-promote-image
              with:
                  source: dndmapp/realm:pr-${{ steps.pr.outputs.number }}
                  target: dndmapp/realm:next

            - name: Delete PR image tag from Docker Hub
              uses: ./.github/actions/dockerhub-delete-tag
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  token: ${{ secrets.DOCKERHUB_TOKEN }}
                  repository: dndmapp/realm
                  tag: pr-${{ steps.pr.outputs.number }}

    storybook-deploy:
        name: Storybook deploy
        needs: ci
        if: needs.ci.outputs.arcane_ui_storybook_affected == 'true'
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        permissions:
            pages: write
            id-token: write
        steps:
            - name: Deploy to GitHub Pages
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
