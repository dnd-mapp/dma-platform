name: Push to Main

on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}

jobs:
    ci:
        name: CI
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup workspace
              uses: ./.github/actions/setup-workspace

            - name: Run CI checks
              uses: ./.github/actions/ci
