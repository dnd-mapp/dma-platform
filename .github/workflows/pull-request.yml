name: Pull Request

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - closed

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: CI
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        outputs:
            realm_build_affected: ${{ steps.affected.outputs.realm_build_affected }}
        permissions:
            contents: read
            code-quality: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - name: Setup workspace
              uses: ./.github/actions/setup-workspace

            - name: Detect affected realm:build
              id: affected
              shell: bash
              run: |
                  RESULT=$(pnpm exec moon query tasks --affected --project realm --id build \
                    | jq -r 'if (.tasks | keys | length) > 0 then "true" else "false" end')

                  echo "realm_build_affected=${RESULT}" >> "$GITHUB_OUTPUT"

            - name: Connect to Tailscale
              uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:github-actions
                  ping: docker-bazel-remote

            - name: Run CI
              shell: bash
              env:
                  MOON_REMOTE_HOST: grpc://docker-bazel-remote:9092
              run: pnpm moon ci

            - name: Report CI results
              uses: moonrepo/run-report-action@bbe7e99bf2aca819ec660ec01fc59d84bdd492d6 # v1.10.0
              if: success() || failure()
              with:
                  access-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload code coverage (realm)
              if: hashFiles('apps/realm/coverage/cobertura-coverage.xml') != ''
              uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
              with:
                  file: apps/realm/coverage/cobertura-coverage.xml
                  language: javascript
                  label: realm

            - name: Upload code coverage (arcane-ui)
              if: hashFiles('packages/arcane-ui/coverage/cobertura-coverage.xml') != ''
              uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
              with:
                  file: packages/arcane-ui/coverage/cobertura-coverage.xml
                  language: javascript
                  label: arcane-ui

    docker:
        name: Docker
        needs: ci
        if: needs.ci.outputs.realm_build_affected == 'true' && github.event.action != 'closed'
        runs-on: ubuntu-22.04
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
              with:
                  images: dndmapp/realm
                  tags: |
                      type=ref,event=pr
                  bake-target: docker-metadata-action

            - name: Log in to Docker Hub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
              with:
                  files: |
                      .docker/bake.hcl
                      ${{ steps.meta.outputs.bake-file }}
                  source: .
                  targets: realm
                  push: true

    docker-cleanup:
        name: Docker cleanup
        needs: ci
        if: needs.ci.outputs.realm_build_affected == 'true' && github.event.action == 'closed' && !github.event.pull_request.merged
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        steps:
            - name: Delete PR image tag from Docker Hub
              shell: bash
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.number }}
              run: |
                  TOKEN=$(jq -rn \
                    --arg user "$DOCKERHUB_USERNAME" \
                    --arg pass "$DOCKERHUB_TOKEN" \
                    '{"username": $user, "password": $pass}' \
                    | curl -fsSL -X POST \
                        -H "Content-Type: application/json" \
                        -d @- \
                        "https://hub.docker.com/v2/users/login/" \
                    | jq -r '.token')

                  HTTP_STATUS=$(curl -o /dev/null -w "%{http_code}" -sL \
                    -X DELETE \
                    -H "Authorization: JWT ${TOKEN}" \
                    "https://hub.docker.com/v2/repositories/dndmapp/realm/tags/pr-${PR_NUMBER}/")

                  if [[ "$HTTP_STATUS" == "204" ]]; then
                    echo "Tag pr-${PR_NUMBER} deleted."
                  elif [[ "$HTTP_STATUS" == "404" ]]; then
                    echo "Tag pr-${PR_NUMBER} not found — nothing to delete."
                  else
                    echo "Unexpected HTTP status: ${HTTP_STATUS}"
                    exit 1
                  fi
