name: Pull Request

on:
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: CI
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        outputs:
            realm_docker_build_affected: ${{ steps.affected.outputs.affected }}
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Setup workspace
              uses: ./.github/actions/setup-workspace

            - name: Detect affected realm:docker-build
              id: affected
              uses: ./.github/actions/detect-affected-task
              with:
                  project: realm
                  task: docker-build

            - name: Connect to Tailscale
              uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:github-actions
                  ping: bazel-remote.wolf-triggerfish.ts.net

            - name: Run CI
              shell: bash
              env:
                  MOON_REMOTE_HOST: grpc://bazel-remote.wolf-triggerfish.ts.net:9092
              run: pnpm moon ci :build :test-ci :lint-ts :lint-css :storybook-build :lint-md :format-check

            - name: Report CI results
              uses: moonrepo/run-report-action@bbe7e99bf2aca819ec660ec01fc59d84bdd492d6 # v1.10.0
              if: success() || failure()
              with:
                  access-token: ${{ secrets.GITHUB_TOKEN }}

    review:
        name: Review
        runs-on: ubuntu-22.04
        timeout-minutes: 15
        if: ${{ !endsWith(github.actor, '[bot]') && !startsWith(github.head_ref, 'release/') }}
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Generate GitHub App token
              id: app-token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  app-id: ${{ secrets.GH_APP_ID }}
                  private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Setup workspace
              uses: ./.github/actions/setup-workspace
              with:
                  install-dependencies: 'false'

            - name: Install Claude Code
              run: pnpm add -g @anthropic-ai/claude-code --approve-build=@anthropic-ai/claude-code

            - name: Review pull request
              shell: bash
              env:
                  CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  PR_NUMBER: ${{ github.event.number }}
                  REPO: ${{ github.repository }}
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha }}
              run: |
                  claude -p /pr-review \
                      --model claude-sonnet-4-6 \
                      --effort high \
                      --allowedTools Bash

    docker:
        name: Docker
        needs: ci
        if: needs.ci.outputs.realm_docker_build_affected == 'true'
        runs-on: ubuntu-22.04
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
              with:
                  images: dndmapp/realm
                  tags: |
                      type=ref,event=pr
                  bake-target: docker-metadata-action

            - name: Log in to Docker Hub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
              with:
                  files: |
                      .docker/bake.hcl
                      ${{ steps.meta.outputs.bake-file }}
                  source: .
                  targets: realm
                  push: true

    e2e:
        name: E2E
        needs: [docker]
        runs-on: ubuntu-22.04
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Setup workspace
              uses: ./.github/actions/setup-workspace

            - name: Connect to Tailscale
              uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:github-actions
                  ping: bazel-remote.wolf-triggerfish.ts.net

            - name: Start Realm container
              env:
                  PR_NUMBER: ${{ github.event.number }}
              run: docker compose -f .docker/compose.e2e.yml up -d --wait

            - name: Run E2E tests
              env:
                  MOON_REMOTE_HOST: grpc://bazel-remote.wolf-triggerfish.ts.net:9092
              run: pnpm moon ci :e2e-ci

            - name: Upload E2E reports
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: e2e-reports
                  path: e2e/realm/reports/
