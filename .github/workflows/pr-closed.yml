name: PR Closed

on:
    pull_request:
        types:
            - closed

jobs:
    docker-cleanup:
        name: Docker cleanup
        if: '!github.event.pull_request.merged'
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        permissions: {}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Delete PR image tag from Docker Hub
              uses: ./.github/actions/dockerhub-delete-tag
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  token: ${{ secrets.DOCKERHUB_TOKEN }}
                  repository: dndmapp/realm
                  tag: pr-${{ github.event.number }}

    release:
        name: Release
        if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/')
        runs-on: ubuntu-22.04
        timeout-minutes: 10
        permissions:
            contents: write
        outputs:
            name: ${{ steps.extract.outputs.name }}
            version: ${{ steps.extract.outputs.version }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Extract package name and version
              id: extract
              shell: bash
              run: |
                  branch="${{ github.head_ref }}"
                  branch="${branch#release/}"

                  if [[ "$branch" =~ ^(.+)-([0-9]+\.[0-9]+\.[0-9].*)$ ]]; then
                      echo "name=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
                      echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
                  else
                      echo "::error::Branch name does not match pattern 'release/<name>-<version>'"
                      exit 1
                  fi

            - name: Create and push git tag
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ steps.extract.outputs.name }}@${{ steps.extract.outputs.version }}
                  NAME: ${{ steps.extract.outputs.name }}
                  VERSION: ${{ steps.extract.outputs.version }}
              shell: bash
              run: |
                  sha=$(git rev-parse HEAD)

                  tag_sha=$(gh api repos/dnd-mapp/dma-platform/git/tags \
                    --method POST \
                    --field tag="$TAG" \
                    --field message="Release $NAME $VERSION" \
                    --field object="$sha" \
                    --field type="commit" \
                    --jq '.sha')

                  gh api repos/dnd-mapp/dma-platform/git/refs \
                    --method POST \
                    --field ref="refs/tags/$TAG" \
                    --field sha="$tag_sha"

            - name: Extract CHANGELOG section
              env:
                  NAME: ${{ steps.extract.outputs.name }}
                  VERSION: ${{ steps.extract.outputs.version }}
              shell: bash
              run: |
                  if [[ -f "packages/${NAME}/CHANGELOG.md" ]]; then
                      changelog="packages/${NAME}/CHANGELOG.md"
                  elif [[ -f "apps/${NAME}/CHANGELOG.md" ]]; then
                      changelog="apps/${NAME}/CHANGELOG.md"
                  else
                      echo "::error::CHANGELOG.md not found for package '${NAME}'"
                      exit 1
                  fi

                  awk -v ver="$VERSION" '
                      /^## \[/{
                          if (found) exit
                          if (index($0, "[" ver "]") > 0) found = 1
                          next
                      }
                      found { print }
                  ' "$changelog" > /tmp/release-notes.md

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ steps.extract.outputs.name }}@${{ steps.extract.outputs.version }}
                  NAME: ${{ steps.extract.outputs.name }}
                  VERSION: ${{ steps.extract.outputs.version }}
              shell: bash
              run: |
                  prerelease_flag=()

                  if [[ "$VERSION" == *"-"* ]]; then
                      prerelease_flag=(--prerelease)
                  fi

                  gh release create "$TAG" \
                      --title "$NAME $VERSION" \
                      --notes-file /tmp/release-notes.md \
                      "${prerelease_flag[@]}"

    docker-release-promote:
        name: Docker release promote
        needs: release
        if: needs.release.outputs.name == 'realm'
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        permissions: {}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Compute semver tags
              id: tags
              shell: bash
              run: |
                  version="${{ needs.release.outputs.version }}"
                  base="${version%%-*}"
                  echo "major=${base%%.*}" >> "$GITHUB_OUTPUT"
                  echo "major_minor=${base%.*}" >> "$GITHUB_OUTPUT"

            - name: Log in to Docker Hub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Promote to :latest
              uses: ./.github/actions/docker-promote-image
              with:
                  source: dndmapp/realm:next
                  target: dndmapp/realm:latest

            - name: Promote to :<major>
              uses: ./.github/actions/docker-promote-image
              with:
                  source: dndmapp/realm:next
                  target: dndmapp/realm:${{ steps.tags.outputs.major }}

            - name: Promote to :<major>.<minor>
              uses: ./.github/actions/docker-promote-image
              with:
                  source: dndmapp/realm:next
                  target: dndmapp/realm:${{ steps.tags.outputs.major_minor }}

            - name: Promote to :<version>
              uses: ./.github/actions/docker-promote-image
              with:
                  source: dndmapp/realm:next
                  target: dndmapp/realm:${{ needs.release.outputs.version }}
