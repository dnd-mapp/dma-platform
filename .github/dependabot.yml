version: 2
updates:
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly

    - package-ecosystem: docker
      directory: /.docker/realm
      schedule:
          interval: weekly
      ignore:
          # Node major bumps must be coordinated across Dockerfile, package.json engines,
          # and @types/node — see ADR 0018. Upgrade when Node LTS drops (each October).
          - dependency-name: node
            update-types:
                - version-update:semver-major

    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      ignore:
          # @types/node major must match the runtime Node major — see ADR 0018.
          - dependency-name: '@types/node'
            update-types:
                - version-update:semver-major
      groups:
          angular:
              patterns:
                  - '@angular/*'
                  - '@angular-eslint/*'
                  - 'angular-eslint'
                  - '@ngrx/*'
                  - 'ng-packagr'
          eslint:
              patterns:
                  - 'eslint'
                  - 'eslint-*'
                  - 'typescript-eslint'
          stylelint:
              patterns:
                  - 'stylelint'
                  - 'stylelint-*'
          testing:
              patterns:
                  - 'playwright'
                  - '@playwright/*'
                  - 'vitest'
                  - '@vitest/*'
                  - 'msw'
          tooling:
              patterns:
                  - '@commitlint/*'
                  - '@moonrepo/*'
                  - 'husky'
                  - 'lint-staged'
                  - 'markdownlint*'
                  - 'prettier'
                  - 'prettier-*'
                  - 'sass'
                  - 'vite'
                  - 'vite-*'
          typescript:
              patterns:
                  - 'typescript'
                  - '@types/*'
                  - 'rxjs'
                  - 'tslib'
          storybook:
              patterns:
                  - 'storybook'
                  - '@storybook/*'
          fonts:
              patterns:
                  - '@fontsource/*'
                  - '@fontsource-variable/*'
                  - 'modern-normalize'
