version: 2
updates:
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly

    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      groups:
          angular:
              patterns:
                  - '@angular/*'
                  - '@angular-eslint/*'
                  - 'angular-eslint'
                  - '@ngrx/*'
          eslint:
              patterns:
                  - 'eslint'
                  - 'eslint-*'
                  - 'typescript-eslint'
          stylelint:
              patterns:
                  - 'stylelint'
                  - 'stylelint-*'
          testing:
              patterns:
                  - 'playwright'
                  - '@playwright/*'
                  - 'vitest'
                  - '@vitest/*'
          tooling:
              patterns:
                  - '@commitlint/*'
                  - 'husky'
                  - 'lint-staged'
                  - 'markdownlint*'
                  - 'prettier'
                  - 'prettier-*'
