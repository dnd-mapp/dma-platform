$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'javascript'
stack: 'unknown'
layer: 'tool'

tasks:
    playwright-install:
        command: 'pnpm playwright-install'
        inputs:
            - 'package.json'
        options:
            cache: false

    format-check:
        command: 'pnpm format-check'
        inputs:
            - '**/*.{ts,cts,mts,tsx,js,cjs,mjs,jsx,json,yaml,yml,scss,css,html,webmanifest}'
            - '.prettierrc'
            - '.prettierignore'

    lint-ts:
        command: 'pnpm lint-ts'
        inputs:
            - '**/*.{js,mjs,cjs}'
            - '!apps/**'
            - '!packages/**'
            - '!e2e/**'

    lint-md:
        command: 'pnpm lint-md'
        inputs:
            - '**/*.md'
            - '.markdownlint-cli2.json'

    release:
        command: 'node scripts/release/index.js'
        deps:
            - 'release-script:build'
        options:
            cache: false
