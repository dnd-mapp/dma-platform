# Workspace settings
packages:
  - 'apps/*'
  - 'e2e/*'
  - 'packages/*'
  - '!dist/**/*'
blockExoticSubdeps: true

# Catalogs
catalogs:
  angular:
    '@angular-devkit/architect': '~0.2102.15'
    '@angular-devkit/core': '~21.2.15'
    '@angular-eslint/builder': '~21.4.0'
    '@angular/build': '~21.2.15'
    '@angular/cdk': '~21.2.14'
    '@angular/cli': '~21.2.15'
    '@angular/common': '~21.2.17'
    '@angular/compiler': '~21.2.17'
    '@angular/compiler-cli': '~21.2.17'
    '@angular/core': '~21.2.17'
    '@angular/forms': '~21.2.17'
    '@angular/platform-browser': '~21.2.17'
    '@angular/platform-browser-dynamic': '~21.2.17'
    '@angular/router': '~21.2.17'
    angular-eslint: '~21.4.0'
    ng-packagr: '~21.2.5'
  default:
    '@commitlint/cli': '~21.0.2'
    '@commitlint/config-conventional': '~21.0.2'
    '@fontsource-variable/inconsolata': '~5.2.8'
    '@fontsource-variable/lora': '~5.2.8'
    '@fontsource/metamorphous': '~5.2.8'
    '@inquirer/prompts': '~8.5.2'
    '@moonrepo/cli': '~2.3.4'
    '@types/node': '~24.12.4'
    '@types/semver': '~7.7.1'
    esbuild: '~0.28.1'
    husky: '~9.1.7'
    lint-staged: '~17.0.8'
    markdownlint-cli2: '~0.22.1'
    modern-normalize: '~3.0.1'
    msw: '~2.14.6'
    rxjs: '~7.8.2'
    sass: '~1.101.0'
    semver: '~7.8.5'
    tslib: '~2.8.1'
    typescript: '~5.9.3'
    vite: '~8.0.16'
  eslint:
    eslint: '~10.5.0'
    eslint-config-prettier: '~10.1.8'
    typescript-eslint: '~8.61.1'
  ngrx:
    '@ngrx/signals': '~21.1.1'
  playwright:
    '@playwright/test': '~1.61.0'
    playwright: '~1.61.0'
  prettier:
    prettier: '~3.8.4'
    prettier-plugin-organize-imports: '~4.3.0'
  storybook:
    '@storybook/addon-docs': '~10.4.6'
    '@storybook/angular': '~10.4.6'
    '@storybook/builder-vite': '~10.4.6'
    storybook: '~10.4.6'
  stylelint:
    stylelint: '~17.13.0'
    stylelint-config-clean-order: '~10.0.0'
    stylelint-config-standard-scss: '~17.0.0'
    stylelint-order: '~8.1.1'
  vitest:
    '@vitest/browser-playwright': '~4.1.9'
    '@vitest/coverage-v8': '~4.1.9'
    '@vitest/ui': '~4.1.9'
    vitest: '~4.1.9'

# CLI Settings
engineStrict: true

# Build Settings
ignoreDepScripts: true
managePackageManagerVersions: false

# Dependency Resolution
minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@dnd-mapp'
packageManagerStrict: true
packageManagerStrictVersion: true

# Other Settings
savePrefix: '~'
strictDepBuilds: true

# Peer Dependency Settings
strictPeerDependencies: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@dnd-mapp'
trustPolicyIgnoreAfter: 10080 # 7 days
verifyDepsBeforeRun: error
