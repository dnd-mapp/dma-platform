<label [for]="inputId()" class="mb-1 block font-medium">{{ label() }}</label>
<dma-control-container [focussed]="focussed()" [disabled]="_disabled()">
    @if (showLeadingIcon()) {
        <ng-container dmaLeadingIcon>
            <ng-container *ngTemplateOutlet="leadingIcon" />
        </ng-container>
    }
    <input
        class="block w-full outline-none"
        #input
        [type]="inputType()"
        [id]="inputId()"
        [value]="_value()"
        [disabled]="_disabled()"
        [placeholder]="placeholder()"
        (focus)="onFocus()"
        (blur)="onBlur()"
        (input)="onInput(input.value)"
    />
</dma-control-container>

<ng-template #leadingIcon>
    <ng-content select="[dmaLeadingIcon]" />
</ng-template>
