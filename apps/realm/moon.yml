$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
stack: 'frontend'
layer: 'application'

fileGroups:
    sources:
        - '**/*.{ts,html,scss}'
        - 'public/**/*'
        - '!**/test/**'
        - '!dist/**'
        - '!.angular/**'
        - '!coverage/**'
        - '!reports/**'
    tests:
        - '**/test/**/*.ts'
        - '.msw/**/*'
    configs:
        - 'tsconfig*.json'
        - 'package.json'
        - 'angular.json'
        - 'vitest.config.mts'
        - 'eslint.config.mjs'
        - '.stylelintrc.json'

tasks:
    start:
        command: 'pnpm start'
        preset: 'server'
        deps:
            - 'arcane-ui:build'
            - 'sigil:build'

    build:
        command: 'pnpm build'
        deps:
            - 'arcane-ui:build'
            - 'sigil:build'
        inputs:
            - 'src/**/*'
            - 'public/**/*'
            - 'tsconfig.json'
            - 'tsconfig.app.json'
            - 'package.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/tsconfig.json'
        outputs:
            - '.angular/**'
            - 'dist/**'

    test-ci:
        command: 'pnpm test-ci'
        deps:
            - 'root:playwright-install'
            - 'arcane-ui:build'
            - 'sigil:build'
        outputs:
            - 'coverage/**'
            - 'reports/**'

    test:
        command: 'pnpm test'
        preset: 'server'
        deps:
            - 'sigil:build'
            - 'root:playwright-install'

    lint-ts:
        command: 'pnpm lint-ts'
        deps:
            - 'arcane-ui:build'

    lint-css:
        command: 'pnpm lint-css'
