$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
stack: 'frontend'
layer: 'application'

tasks:
    start:
        command: 'pnpm start'
        preset: 'server'

    build:
        command: 'pnpm build'
        deps:
            - 'arcane-ui:build'
        inputs:
            - 'src/**/*'
            - 'public/**/*'
            - 'tsconfig.json'
            - 'tsconfig.app.json'
            - 'package.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/tsconfig.json'
        outputs:
            - '.angular/**'
            - 'dist/**'

    test-ci:
        command: 'pnpm test-ci'
        deps:
            - 'arcane-ui:build'
            - 'root:playwright-install'
        inputs:
            - 'src/**/*'
            - 'test/**/*'
            - 'vitest.config.mts'
            - 'tsconfig.json'
            - 'tsconfig.spec.json'
            - 'package.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/tsconfig.json'
        outputs:
            - 'coverage/**'
            - 'reports/**'

    test:
        command: 'pnpm test'
        preset: 'server'
        deps:
            - 'root:playwright-install'

    lint-ts:
        command: 'pnpm lint-ts'
        deps:
            - 'arcane-ui:build'
        inputs:
            - 'src/**/*.{ts,html}'
            - 'test/**/*.ts'
            - 'eslint.config.mjs'
            - 'tsconfig.json'
            - 'tsconfig.app.json'
            - 'tsconfig.spec.json'
            - 'angular.json'
            - '/tsconfig.base.json'
            - '/packages/eslint-config/src/**/*.mjs'

    lint-css:
        command: 'pnpm lint-css'
        inputs:
            - 'src/**/*.scss'
            - '.stylelintrc.json'
            - '/packages/stylelint-config/src/**/*.mjs'
